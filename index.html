<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCSE Revision Engine</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { margin-bottom: 5px; color: #fff; }
        h2 { color: #cbd5e1; border-bottom: 2px solid #334155; padding-bottom: 8px; margin-top: 20px; width: 100%; }
        p { color: var(--text-muted); margin-top: 0; }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Top-Level Section Navigation Tabs */
        .top-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 15px;
        }

        .nav-tab {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            background-color: #1e293b;
            border: 1px solid #334155;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .nav-tab.active {
            background-color: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        .view-panel {
            display: none;
        }

        .view-panel.active {
            display: block;
        }

        .sub-section {
            margin-bottom: 35px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        button {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid #334155;
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        button:hover {
            background-color: rgba(255,255,255,0.05);
            border-color: #475569;
            transform: translateY(-2px);
        }

        .subject-btn:hover {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        /* Quiz UI Panel */
        #quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: none;
            width: 100%;
            box-sizing: border-box;
        }

        .config-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        select {
            flex: 1;
            background-color: var(--bg-color);
            color: white;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            text-align: left;
            background-color: rgba(255,255,255,0.03);
        }

        .back-btn {
            background-color: #475569;
            margin-bottom: 20px;
        }
        .back-btn:hover { background-color: #64748b; }

        .feedback {
            font-weight: 600;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
        .correct { background-color: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid var(--accent-success); }
        .wrong { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }
        
        .hint-box {
            font-style: italic;
            color: var(--text-muted);
            margin-bottom: 15px;
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-left: 3px solid var(--accent-primary);
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>GCSE Portal</h1>
        <p>Navigate between main panels to view core data, options or clubs</p>
    </header>

    <div class="container">
        
        <div id="navigation-tabs" class="top-nav">
            <button id="tab-academics" class="nav-tab active" onclick="switchMainTab('academics')">Academics</button>
            <button id="tab-extracurricular" class="nav-tab" onclick="switchMainTab('extracurricular')">Extra-Curricular</button>
        </div>

        <div id="menu-view">
            
            <div id="panel-academics" class="view-panel active">
                <div class="sub-section">
                    <h2>Core Subjects</h2>
                    <div class="grid" id="core-grid"></div>
                </div>
                <div class="sub-section">
                    <h2>Optional Subjects</h2>
                    <div class="grid" id="optional-grid"></div>
                </div>
            </div>

            <div id="panel-extracurricular" class="view-panel">
                <div class="sub-section">
                    <h2>Clubs & Enrichment</h2>
                    <div class="grid" id="extracurricular-grid"></div>
                </div>
            </div>

        </div>

        <div id="quiz-container">
            <button class="back-btn" onclick="returnToMenu()">← Back to Dashboard</button>
            <h3 id="current-subject-title" style="margin-top:0; color: var(--accent-primary);">Subject</h3>
            
            <div class="config-row">
                <select id="tier-select" onchange="initQuizConfig()">
                    <option value="Foundation">Foundation Tier</option>
                    <option value="Higher">Higher Tier</option>
                </select>
                <select id="difficulty-select" onchange="initQuizConfig()">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                    <option value="Challenger">Challenger</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">

            <div id="quiz-gameplay">
                <div class="question-text" id="question-box">Loading...</div>
                <div class="hint-box" id="hint-box"></div>
                <div class="options-list" id="options-box"></div>
                <div class="feedback" id="feedback-box"></div>
                <button id="next-btn" style="display:none; background-color: var(--accent-success);" onclick="nextQuestion()">Next Question →</button>
            </div>
        </div>
    </div>

    <script>
        // Subject categories structural layout mapping
        const coreSubjects = {
            'maths': 'Mathematics',
            'english': 'English Literature & Lang',
            'science': 'Combined Science'
        };

        const optionalSubjects = {
            'computer_science': 'Computer Science',
            'history': 'History',
            'geography': 'Geography',
            'physical_education': 'Physical Education',
            'sociology': 'Sociology',
            'media_studies': 'Media Studies',
            'art_and_textiles': 'Art & Textiles',
            'photography': 'Photography',
            'drama': 'Drama',
            'music': 'Music',
            'spanish': 'Spanish'
        };

        const extracurricularActivities = {
            'coding_club': 'Coding Club',
            'debate_society': 'Debate Society',
            'sports_academy': 'Sports Academy & Fixtures',
            'drama_production': 'School Production & Theatre Club'
        };

        let currentSubjectData = null;
        let currentSubjectKey = "";
        let activeQuestionsPool = [];
        let currentQuestionIndex = 0;

        // Render data elements into grid boxes dynamically
        function initAppDashboard() {
            const coreGrid = document.getElementById('core-grid');
            const optionalGrid = document.getElementById('optional-grid');
            const extraGrid = document.getElementById('extracurricular-grid');

            // Build Core Buttons
            Object.keys(coreSubjects).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'subject-btn';
                btn.textContent = coreSubjects[key];
                btn.onclick = () => launchQuizEngine(key, coreSubjects[key]);
                coreGrid.appendChild(btn);
            });

            // Build Optional Buttons
            Object.keys(optionalSubjects).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'subject-btn';
                btn.textContent = optionalSubjects[key];
                btn.onclick = () => launchQuizEngine(key, optionalSubjects[key]);
                optionalGrid.appendChild(btn);
            });

            // Build Extra-Curricular / Club Buttons
            Object.keys(extracurricularActivities).forEach(key => {
                const btn = document.createElement('button');
                btn.textContent = extracurricularActivities[key];
                btn.onclick = () => alert(`Opening overview module for ${extracurricularActivities[key]}...`);
                extraGrid.appendChild(btn);
            });
        }

        // Handle shifting the top level display panels
        function switchMainTab(targetTab) {
            // Toggle active tracking classes on tab selectors
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));

            document.getElementById(`tab-${targetTab}`).classList.add('active');
            document.getElementById(`panel-${targetTab}`).classList.add('active');
        }

        // Pull active data and configure quiz setup display
        async function launchQuizEngine(subjectKey, subjectName) {
            try {
                const response = await fetch(`${subjectKey}.json`);
                if (!response.ok) throw new Error(`Status response link error code: ${response.status}`);
                
                currentSubjectData = await response.json();
                currentSubjectKey = subjectKey;
                
                document.getElementById('current-subject-title').textContent = subjectName;
                document.getElementById('navigation-tabs').style.display = 'none';
                document.getElementById('menu-view').style.display = 'none';
                document.getElementById('quiz-container').style.display = 'block';
                
                initQuizConfig();
            } catch (err) {
                alert(`Could not load quiz metrics data. Ensure ${subjectKey}.json exists in your directory context.`);
                console.error(err);
            }
        }

        function initQuizConfig() {
            const tier = document.getElementById('tier-select').value;
            const diff = document.getElementById('difficulty-select').value;
            
            if (currentSubjectData && currentSubjectData[tier] && currentSubjectData[tier][diff]) {
                activeQuestionsPool = currentSubjectData[tier][diff];
            } else {
                activeQuestionsPool = [];
            }
            currentQuestionIndex = 0;
            displayQuestion();
        }

        function displayQuestion() {
            const qBox = document.getElementById('question-box');
            const hBox = document.getElementById('hint-box');
            const oBox = document.getElementById('options-box');
            const fBox = document.getElementById('feedback-box');
            const nextBtn = document.getElementById('next-btn');

            fBox.style.display = 'none';
            nextBtn.style.display = 'none';
            oBox.innerHTML = '';

            if (activeQuestionsPool.length === 0) {
                qBox.textContent = "No data questions configured yet for this tier/difficulty tier selection.";
                hBox.style.display = 'none';
                return;
            }

            const activeQ = activeQuestionsPool[currentQuestionIndex];
            qBox.textContent = `Q${currentQuestionIndex + 1}: ${activeQ.q}`;
            
            if(activeQ.hint) {
                hBox.style.display = 'block';
                hBox.textContent = `Hint: ${activeQ.hint}`;
            } else {
                hBox.style.display = 'none';
            }

            activeQ.options.forEach((opt, idx) => {
                const oBtn = document.createElement('button');
                oBtn.className = 'option-btn';
                oBtn.textContent = opt;
                oBtn.onclick = () => verifyChoiceSelection(idx, activeQ.correct);
                oBox.appendChild(oBtn);
            });
        }

        function verifyChoiceSelection(selectedIndex, correctIndex) {
            const fBox = document.getElementById('feedback-box');
            const nextBtn = document.getElementById('next-btn');
            
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

            if (selectedIndex === correctIndex) {
                fBox.className = "feedback correct";
                fBox.textContent = "✓ Correct Answer!";
            } else {
                fBox.className = "feedback wrong";
                fBox.textContent = `✗ Incorrect. Correct: "${activeQuestionsPool[currentQuestionIndex].options[correctIndex]}"`;
            }
            fBox.style.display = 'block';
            nextBtn.style.display = 'inline-block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex >= activeQuestionsPool.length) {
                currentQuestionIndex = 0;
            }
            displayQuestion();
        }

        function returnToMenu() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('navigation-tabs').style.display = 'flex';
            document.getElementById('menu-view').style.display = 'block';
        }

        window.onload = initAppDashboard;
    </script>
</body>
</html>
